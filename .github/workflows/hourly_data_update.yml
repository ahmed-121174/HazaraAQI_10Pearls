name: Hourly Data Update

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data ingestion
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
          HOPSWORKS_HOST: eu-west.cloud.hopsworks.ai
        run: python update_data.py

      - name: Commit updated data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "ahmed.ali01100001@gmail.com"
          git config --local user.name "Ahmed Ali"
          git add data/*.csv
          git diff --staged --quiet || (git commit -m "[Hourly] Auto-update AQI data for all 6 Hazara districts" && git pull --rebase origin main && git push https://x-access-token:${GITHUB_TOKEN}@github.com/ahmed-121174/HazaraAQI_10Pearls.git HEAD:main)
