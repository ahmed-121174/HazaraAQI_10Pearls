name: Daily Model Retrain

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every day at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full pipeline (data + training + LSTM)
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
          HOPSWORKS_HOST: eu-west.cloud.hopsworks.ai
        run: python run_pipeline.py

      - name: Commit and push updated models
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --local user.email "ahmed.ali01100001@gmail.com"
          git config --local user.name "Ahmed Ali"
          git add models/ data/*.csv
          git diff --staged --quiet || (git commit -m "[Daily] Retrained models + updated SHAP importance" && git pull --rebase origin main && git push https://x-access-token:${PAT_TOKEN}@github.com/ahmed-121174/HazaraAQI_10Pearls.git HEAD:main)

